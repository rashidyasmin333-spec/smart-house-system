<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f7fa;
}

nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
}

nav h2{
    font-size:28px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.header{
    text-align:center;
    padding:40px;
}

.header h1{
    color:#003366;
    margin-bottom:10px;
}

.stats{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:20px;
}

.card{
    width:200px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card h2{
    color:#003366;
}

.section{
    padding:30px 70px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th, td{
    padding:15px;
    text-align:left;
    border-bottom:1px solid #eee;
}

th{
    background:#003366;
    color:white;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    margin-right:5px;
}

.edit{
    background:orange;
}

.delete{
    background:red;
}

</style>

</head>

<body>

<nav>

<h2>Smart Housing Admin</h2>

<ul>
<li><a href="admin-dashboard.html">Dashboard</a></li>
<li><a href="login.html">Logout</a></li>
</ul>

</nav>

<div class="header">

<h1>Admin Dashboard</h1>

<p>Manage entire Smart Housing System</p>

<div class="stats">

<button onclick="window.location.href='tenants_details.html'">
    <h2 style="color: #003366">10</h2>
<p style="color: #003366">Tenants</p>
</button>



<button onclick="window.location.href='landload_detail.html'">
    <h2 style="color: #003366">5</h2>
<p style="color: #003366">Landloards</p>
</button>



<button onclick="window.location.href='house_details.html'">
    <h2 style="color: #003366">90</h2>
<p style="color: #003366">Properties</p>
</button>

</div>

</div>

<div class="section">





</div>

<script>

function editUser(btn){
    let row = btn.parentElement.parentElement;
    let name = row.cells[0].innerText;

    alert("Editing user: " + name);
}

function deleteUser(btn){
    let row = btn.parentElement.parentElement;
    let name = row.cells[0].innerText;

    if(confirm("Delete user: " + name + "?")){
        row.remove();
        alert("User deleted successfully");
    }
}

</script>

</body>
</html>
