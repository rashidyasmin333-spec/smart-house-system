<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Housing System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: '#3b82f6' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-gradient-to-r from-blue-600 to-indigo-700 shadow-md border-b border-indigo-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0">
                    <a href="index.html" class="text-2xl font-bold text-white tracking-tight">Smart<span class="text-blue-200">Housing</span></a>
                </div>
                <div id="nav-right" class="flex space-x-4">
                    <!-- Populated by app.js -->
                    <a href="login.html" class="text-gray-600 hover:text-gray-900 px-3 py-2 rounded-md font-medium transition-colors">Login / Register</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow">
        <!-- Hero Section -->
        <section class="bg-brand text-white py-20 px-4 sm:px-6 lg:px-8 text-center bg-gradient-to-br from-blue-600 to-indigo-700 shadow-inner min-h-[70vh] flex flex-col justify-center">
            <div class="max-w-3xl mx-auto">
                <h1 class="text-4xl sm:text-5xl md:text-6xl font-extrabold tracking-tight mb-6">Find Your Dream Home</h1>
                <p class="text-lg sm:text-xl md:text-2xl text-blue-100 mb-10">Discover modern, beautiful properties available for rent. Smart living starts here.</p>
                <a href="properties.html" class="inline-block bg-white text-brand font-bold text-lg px-10 py-4 rounded-full shadow hover:bg-gray-50 hover:shadow-lg hover:-translate-y-1 transform transition-all duration-300">Browse Properties</a>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-8 text-center">
        <p>&copy; 2026 Smart Housing System. All rights reserved.</p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
