<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Landlord Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f7fa;
}

nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
}

nav h2{
    font-size:28px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.header{
    padding:40px 70px;
    text-align:center;
}

.header h1{
    color:#003366;
}

.add-btn{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    background:green;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
    gap:20px;
    padding:20px 70px;
}

.card{
    background:white;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    padding:15px;
}

.card h3{
    color:#003366;
    margin-bottom:10px;
}

.card p{
    margin:6px 0;
}

.card button{
    width:100%;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.edit{
    background:orange;
}

.delete{
    background:red;
}

.status{
    background:#003366;
}

</style>

</head>

<body>

<nav>

<h2>Smart Housing</h2>

<ul>
<li><a href="login.html">Logout</a></li>
</ul>

</nav>

<div class="header">

<h1>Landlord Dashboard</h1>

<p>Manage your properties easily</p>

<button class="add-btn" onclick="addHouse()">+ Add New House</button>

</div>

<div class="container">

<div class="card">
<h3>Modern Apartment</h3>
<p>Location: Mbezi</p>
<p>Price: 350,000 TZS</p>
<p>Status: Available</p>

<button class="edit" onclick="editHouse()">Edit</button>
<button class="delete" onclick="deleteHouse()">Delete</button>
<button class="status" onclick="changeStatus()">Mark as Rented</button>
</div>

<div class="card">
<h3>Family House</h3>
<p>Location: Sinza</p>
<p>Price: 450,000 TZS</p>
<p>Status: Pending</p>

<button class="edit" onclick="editHouse()">Edit</button>
<button class="delete" onclick="deleteHouse()">Delete</button>
<button class="status" onclick="changeStatus()">Mark as Rented</button>
</div>

</div>

<script>

function addHouse(){
    alert("Redirect to Add House page");
}

function editHouse(){
    alert("Edit house feature");
}

function deleteHouse(){
    alert("House deleted (frontend simulation)");
}

function changeStatus(){
    alert("Status updated to Rented");
}

</script>

</body>
</html>
