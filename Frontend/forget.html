<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<style>


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
}


nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
}

nav h2{
    font-size:28px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}


.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:85vh;
}


.box{
    width:400px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

.box h2{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#003366;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>


<nav>

<h2>Smart Housing</h2>

<ul>

<li><a href="home.html">Home</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="register.html">Register</a></li>

</ul>

</nav>


<div class="container">

<div class="box">

<h2>Forgot Password</h2>

<form id="forgotForm">

<input type="text" id="username" placeholder="Enter Username" required>

<input type="email" id="email" placeholder="Enter Email" required>

<button type="submit">Send Reset Link</button>

</form>

<p>
Back to <a href="login.html">Login</a>
</p>

</div>

</div>


<script>

document.getElementById("forgotForm").addEventListener("submit", function(e){

    e.preventDefault();

    let username = document.getElementById("username").value;
    let email = document.getElementById("email").value;

    if(username === "" || email === ""){
        alert("Please fill all fields");
        return;
    }

    alert("Reset link sent to " + email);

    window.location.href = "reset-password.html";

});

</script>

</body>

</html>
