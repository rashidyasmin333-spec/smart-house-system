<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f7fa;
}

nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
}

nav h2{
    font-size:28px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.box{
    width:380px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.box h2{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

</style>

</head>

<body>

<nav>

<h2>Smart Housing</h2>

<ul>
<li><a href="home.html">Home</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="register.html">Register</a></li>
</ul>

</nav>

<div class="container">

<div class="box">

<h2>Forgot Password</h2>

<form id="forgotForm">

<input type="email" id="email" placeholder="Enter your email" required>

<button type="submit">Send Reset Link</button>

</form>

</div>

</div>

<script>

document.getElementById("forgotForm").addEventListener("submit", function(e){

    e.preventDefault();

    let email = document.getElementById("email").value;

    if(email === ""){
        alert("Please enter email");
        return;
    }

    localStorage.setItem("resetEmail", email);

    alert("Reset link sent to " + email);

    window.location.href = "reset-password.html";

});

</script>

</body>
</html>
