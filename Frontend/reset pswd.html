<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f5f7fa;
}

nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
}

nav h2{
    font-size:28px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:80vh;
}

.box{
    width:380px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.box h2{
    text-align:center;
    color:#003366;
    margin-bottom:10px;
}

.info{
    text-align:center;
    color:green;
    margin-bottom:10px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

</style>

</head>

<body>

<nav>

<h2>Smart Housing</h2>

<ul>
<li><a href="home.html">Home</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="register.html">Register</a></li>
</ul>

</nav>

<div class="container">

<div class="box">

<h2>Reset Password</h2>

<p class="info" id="info"></p>

<form id="resetForm">

<input type="password" id="password1" placeholder="New Password" required>

<input type="password" id="password2" placeholder="Confirm Password" required>

<button type="submit">Reset Password</button>

</form>

</div>

</div>

<script>

let email = localStorage.getItem("resetEmail");

document.getElementById("info").innerText =
"Resetting password for: " + email;

document.getElementById("resetForm").addEventListener("submit", function(e){

    e.preventDefault();

    let p1 = document.getElementById("password1").value;
    let p2 = document.getElementById("password2").value;

    if(p1 !== p2){
        alert("Passwords do not match");
        return;
    }

    alert("Password reset successfully!");

    window.location.href = "login.html";

});

</script>

</body>
</html>
