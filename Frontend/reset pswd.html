<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
}

nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
}

nav h2{
    font-size:28px;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:85vh;
}

.box{
    width:400px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
}

.box h2{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    color:#003366;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<nav>

<h2>Smart Housing</h2>

<ul>
<li><a href="home.html">Home</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="register.html">Register</a></li>
</ul>

</nav>

<div class="container">

<div class="box">

<h2>Reset Password</h2>

<form id="resetForm">

<input type="password" id="pass1" placeholder="New Password" required>

<input type="password" id="pass2" placeholder="Confirm Password" required>

<button type="submit">Save Password</button>

</form>

<p>
Back to <a href="login.html">Login</a>
</p>

</div>

</div>

<script>

document.getElementById("resetForm").addEventListener("submit", function(e){

    e.preventDefault();

    let pass1 = document.getElementById("pass1").value;
    let pass2 = document.getElementById("pass2").value;

    if(pass1 === "" || pass2 === ""){
        alert("Please fill all fields");
        return;
    }

    if(pass1 !== pass2){
        alert("Passwords do not match!");
        return;
    }

    alert("Password changed successfully!");

    window.location.href = "login.html";

});

</script>

</body>
</html>
