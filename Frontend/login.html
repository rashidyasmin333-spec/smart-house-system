<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Smart Housing</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
}

nav{
    background:#003366;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
}

nav h2{
    font-size:28px;
}

nav ul{
    display:flex;
    list-style:none;
}

nav ul li{
    margin-left:25px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:85vh;
}

.login-box{
    width:400px;
    background:white;
    padding:35px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

.login-box h2{
    text-align:center;
    color:#003366;
    margin-bottom:20px;
}

.login-box input,
.login-box select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-box button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.login-box button:hover{
    background:#0055aa;
}

.links{
    text-align:center;
    margin-top:20px;
}

.links a{
    text-decoration:none;
    color:#003366;
}

.links p{
    margin:8px 0;
}
</style>

</head>

<body>

<nav>

<h2>Smart Housing</h2>

<ul>

<li><a href="home.html">Home</a></li>

<li><a href="register.html">Register</a></li>

</ul>

</nav>

<div class="container">

<div class="login-box">

<h2>Login</h2>

<form id="loginForm">

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<select id="role" required>

<option value="">Select Role</option>

<option value="tenant">Tenant</option>

<option value="landlord">Landlord</option>

<option value="admin">Administrator</option>

</select>

<button type="submit">Login</button>

</form>

<div class="links">

<p>
<a href="forgot-password.html">Forgot Password?</a>
</p>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let role=document.getElementById("role").value;

if(role==="tenant"){

window.location.href="tenant/dashboard.html";

}

else if(role==="landlord"){

window.location.href="landlord/dashboard.html";

}

else if(role==="admin"){

window.location.href="admin/dashboard.html";

}

else{

alert("Please select your role.");

}

});

</script>

</body>
</html>
