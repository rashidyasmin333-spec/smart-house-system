<title>Login - Smart Housing System</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}


body{

    background:#f4f6f8;

}


/* Header */

header{

    background:#1e3a8a;
    color:white;

    padding:20px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

}


header h1{

    font-size:28px;

}



nav a{

    color:white;

    text-decoration:none;

    margin-left:20px;

}



/* Login Box */

.container{

    width:400px;

    background:white;

    margin:60px auto;

    padding:30px;

    border-radius:10px;

    box-shadow:0 5px 15px #ccc;

}



.container h2{

    text-align:center;

    color:#1e3a8a;

    margin-bottom:25px;

}



label{

    display:block;

    margin-top:15px;

    font-weight:bold;

}



input, select{

    width:100%;

    padding:12px;

    margin-top:5px;

    border:1px solid #ccc;

    border-radius:5px;

}



button{

    width:100%;

    margin-top:25px;

    padding:12px;

    background:#1e3a8a;

    color:white;

    border:none;

    border-radius:5px;

    cursor:pointer;

    font-size:16px;

}



button:hover{

    background:#162d6b;

}



.register{

    text-align:center;

    margin-top:20px;

}


.register a{

    color:#1e3a8a;

}



footer{

    background:#222;

    color:white;

    text-align:center;

    padding:15px;

    margin-top:50px;

}


</style>


</head>



<body>


<header>


<h1>
Smart Housing System
</h1>


<nav>

<!-- <a href="index.html">
Home
</a> -->


<!-- <a href="register.html">
Register
</a> -->


</nav>


</header>





<div class="container">


<h2>
Login
</h2>



<form onsubmit="loginUser(event)">



<label>
Email Address
</label>


<input type="email" id="email" required>




<label>
Password
</label>


<input type="password" id="password" required>





<label>
Login As
</label>


<select id="role" required>


<option value="">
Select Role
</option>


<option value="tenant">
Tenant
</option>


<option value="landlord">
Landlord
</option>


<option value="admin">
Admin
</option>


</select>





<button type="submit">

Login

</button>



</form>




<div class="register">

<p>
Don't have account?
<a href="register.html">
Register
</a>
</p>

</div>



</div>





<footer>

<p>
© 2026 Smart Housing System
</p>

</footer>



</body>

<script>


function loginUser(event){


    event.preventDefault();



    let role = document.getElementById("role").value;



    if(role === "tenant"){


       window.location.href = "tenant.html";


    }


    else if(role === "landlord"){


        window.location.href = "Landload_dashboard.html";


    }


    else if(role === "admin"){


        window.location.href = "admin.html";


    }


    else{


        alert("Please select your role");


    }



}
